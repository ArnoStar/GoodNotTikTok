name: Deploy API

on:
  workflow_run:
    workflows: ["Docker Image API CI"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          debug: true
          script: |
            docker pull arnostar/nottiktokapi:latest
            docker stop nottiktokapi || true
            docker rm nottiktokapi || true
            docker run -d \
              --name nottiktokapi \
              -p 2701:8000 \
              --network nottiktok \
              --env-file /home/arno/nottiktok/.env \
              -v /srv/videos/:/videos \
              arnostar/nottiktokapi:latest