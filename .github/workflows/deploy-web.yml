name: Deploy Web

on:
  push:
    branches: [ main ]
    paths:
      - "clients/web/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: build_web

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull arnostar/nottiktokweb:latest
            docker stop nottiktokweb || true
            docker rm nottiktokweb || true
            docker run -d \
              --name nottiktokweb \
              -p 3000:80 \
              arnostar/nottiktokweb:latest