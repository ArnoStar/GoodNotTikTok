name: Deploy Web

on:
  workflow_run:
    workflows: ["Docker Image Web CI"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull arnostar/nottiktokweb:latest
            docker stop nottiktokweb || true
            docker rm nottiktokweb || true
            docker run -d \
              --name nottiktokweb \
              -p 3000:80 \
              arnostar/nottiktokweb:latest